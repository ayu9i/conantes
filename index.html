<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan Hub | V3.6 Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --conan-gold: #d4af37; --glass: rgba(255, 255, 255, 0.08); --danger: #ff4d4d; }
        body { margin: 0; font-family: 'Kanit', sans-serif; background: #000; color: white; min-height: 100vh; overflow-x: hidden; }
        
        /* แก้ไข Banner ให้ไม่ดันหน้าจอ */
        .new-release-banner { 
            background: linear-gradient(90deg, #1a1a1a, #b8860b, #1a1a1a); 
            color: #fff; 
            padding: 12px 5px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            text-align: center; 
            border-bottom: 2px solid var(--conan-gold);
            width: 100%;
        }
        .new-release-banner span { color: #fff; animation: blink 1.5s infinite; display: block; margin-top: 2px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .container { width: 90%; max-width: 450px; margin: 20px auto; text-align: center; }
        .premium-card { background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 24px; padding: 20px; backdrop-filter: blur(15px); }
        
        .result-container { margin: 15px 0; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; background: rgba(0,0,0,0.3); }
        .info-badge { display: inline-block; padding: 4px 12px; background: rgba(212, 175, 55, 0.1); border: 1px solid var(--conan-gold); border-radius: 50px; font-size: 0.75rem; color: var(--conan-gold); margin-bottom: 8px; opacity: 0; }
        .info-badge.show { opacity: 1; }
        
        .ep-display { font-size: 1.5rem; font-weight: 600; color: #fff; opacity: 0; transition: 0.4s; margin: 0; }
        .ep-display span { color: var(--conan-gold); font-size: 1rem; display: block; margin-top: 5px; }
        .ep-display.show { opacity: 1; }

        .btn-main { width: 100%; padding: 14px; font-size: 1rem; font-weight: 600; border-radius: 12px; border: none; cursor: pointer; transition: 0.2s; margin-bottom: 10px; font-family: 'Kanit'; }
        .btn-gold { background: linear-gradient(135deg, #d4af37 0%, #f1d57a 100%); color: #000; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); }
        .btn-dark { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; }
        
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        select { background: #111; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 12px; width: 100%; font-family: 'Kanit'; margin-bottom: 10px; outline: none; }

        .history-card { margin-top: 20px; text-align: left; background: rgba(0,0,0,0.5); border-radius: 18px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .history-title { font-size: 0.8rem; color: var(--conan-gold); margin-bottom: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .history-list { max-height: 200px; overflow-y: auto; font-size: 0.85rem; }
        .history-item { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; }
        .history-item.checked span { text-decoration: line-through; opacity: 0.5; }
        .btn-del { color: var(--danger); cursor: pointer; font-size: 1.2rem; }

        /* ประตูเปิด-ปิด */
        .door-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; display: flex; }
        .door { position: absolute; width: 50%; height: 100%; background: #0a0a0a; transition: 0.5s ease-in-out; border: 1px solid var(--conan-gold); }
        .door-left { left: -50%; } .door-right { right: -50%; }
        .door-container.active .door-left { transform: translateX(100%); }
        .door-container.active .door-right { transform: translateX(-100%); }
    </style>
</head>
<body>

<div class="new-release-banner">
    🚨 NEXT CASE: <span>ซีซั่น 25 ตอนที่ 12 เสาร์นี้ 21:00 น.!</span>
</div>

<div class="door-container" id="doorSystem"><div class="door door-left"></div><div class="door door-right"></div></div>

<div class="container">
    <h2 style="letter-spacing: 3px; margin: 10px 0;">CONAN HUB</h2>
    
    <div class="premium-card">
        <div id="badge" class="info-badge">สแตนด์บาย...</div>
        <div class="result-container">
            <h2 id="epDisplay" class="ep-display">กดเพื่อสุ่มคดี!</h2>
        </div>

        <button class="btn-main btn-gold" onclick="spinEverything()">สุ่มทุกอย่าง (ห้ามซ้ำ)</button>
        
        <div class="grid-btns">
            <button class="btn-main btn-dark" onclick="spinMovie()">มูฟวี่ 1-28</button>
            <button class="btn-main btn-dark" onclick="spinLupin()">ปะทะ ลูแปง</button>
        </div>

        <select id="charSelect">
            <option value="kid">จอมโจรคิด 🎩</option>
            <option value="ai">ไฮบาระ ไอ 🧪</option>
            <option value="amuro">อามุโร่ ☕</option>
            <option value="akai">อากาอิ 🔫</option>
        </select>
        <button class="btn-main" style="background:none; border:1px solid var(--conan-gold); color:white;" onclick="spinChar()">สุ่มตามตัวละคร</button>

        <div class="history-card">
            <div class="history-title">ประวัติ (ลบเพื่อสุ่มใหม่) <span onclick="clearAllHistory()" style="cursor:pointer; opacity:0.6;">[ล้างหมด]</span></div>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>
</div>

<script>
    // Logic การสุ่มและกันซ้ำแบบเดียวกับ V3.5 แต่แก้ UI
    const movieNames = ["คดีปริศนาระเบิดระฟ้า", "คดีฆาตกรรมไพ่ปริศนา", "พ่อมดคนสุดท้ายแห่งศตวรรษ", "คดีฆาตกรรมนัยน์ตาปริศนา", "คดีปริศนาเส้นตายสู่สวรรค์", "ปริศนาบนถนนสายมรณะ", "คดีฆาตกรรมแห่งเมืองปริศนา", "มนตราแห่งรัตติกาลสีเงิน", "ยุทธการเหนือห้วงทะเลลึก", "บทเพลงมรณะแด่เหล่ายอดนักสืบ", "ปริศนามหาขุมทรัพย์โจรสลัด", "บทเพลงแห่งความตาย", "ปริศนานักล่าทรชนทมิฬ", "ปริศนามรณะเหนือน่านฟ้า", "15 นาทีเฉียดตาย", "ระทึกขวัญเรือรบมรณะ", "ปริศนาทานตะวันมรณะ", "ปริศนารัตติกาลทมิฬ", "ปริศนาเพลงกลอนซ่อนรัก", "ปฏิบัติการสายลับเดอะซีโร่", "ศึกชิงอัญมณีสีคราม", "กระสุนสีเพลิง", "เจ้าสาวฮาโลวีน", "มฤตยูใต้น้ำทมิฬ", "ดาวห้าแฉกแห่งร้อยล้าน", "ศึกชิงเพชรกลางท้องฟ้า", "คดีฆาตกรรมปริศนาโรงละคร", "คดีปริศนากุหลาบดำ"];
    const charData = { kid: ["ซีซั่น 1 ตอนที่ 78", "ซีซั่น 3 ตอนที่ 139", "ซีซั่น 5 ตอนที่ 235"], ai: ["ซีซั่น 3 ตอนที่ 136", "ซีซั่น 4 ตอนที่ 148"], amuro: ["ซีซั่น 15 ตอนที่ 719"], akai: ["ซีซั่น 6 ตอนที่ 249"] };
    const tvSeasons = { 20: 52, 21: 52, 22: 52, 23: 53, 24: 52, 25: 11 };
    let history = JSON.parse(localStorage.getItem('conan_fixed_v3_6')) || [];

    function startSpin(fn) {
        document.getElementById('doorSystem').classList.add('active');
        setTimeout(() => { document.getElementById('epDisplay').classList.remove('show'); fn(); }, 500);
        setTimeout(() => document.getElementById('doorSystem').classList.remove('active'), 1200);
        setTimeout(() => { document.getElementById('epDisplay').classList.add('show'); document.getElementById('badge').classList.add('show'); }, 1500);
    }

    function isDuplicate(text) { return history.some(h => h.text.includes(text)); }

    function spinEverything() {
        startSpin(() => {
            let res = "", badge = "", retry = 0;
            do {
                const p = Math.random();
                if (p < 0.6) {
                    const ep = Math.floor(Math.random() * 981) + 1;
                    res = `ซีซั่น ${Math.ceil(ep/52) > 19 ? 19 : Math.ceil(ep/52)} ตอนที่ ${ep}`;
                    badge = "TV SERIES";
                } else {
                    const i = Math.floor(Math.random() * movieNames.length);
                    res = `Movie ${i+1}: ${movieNames[i]}`;
                    badge = "THE MOVIE";
                }
                retry++; if(retry > 50) break;
            } while (isDuplicate(res));
            updateUI(res.includes(':') ? `Movie ${res.split(': ')[0].split(' ')[1]} <span>${res.split(': ')[1]}</span>` : res, badge);
            addH(res);
        });
    }

    function spinMovie() {
        startSpin(() => {
            let res, retry = 0;
            do {
                const i = Math.floor(Math.random() * movieNames.length);
                res = `Movie ${i+1}: ${movieNames[i]}`;
                retry++; if(retry > 30) break;
            } while (isDuplicate(res));
            updateUI(`Movie ${res.split(': ')[0].split(' ')[1]} <span>${res.split(': ')[1]}</span>`, "THE MOVIE");
            addH(res);
        });
    }

    function spinLupin() {
        startSpin(() => {
            let res = Math.random() > 0.5 ? "Lupin III vs Conan (2009)" : "Lupin III vs Conan (2013)";
            updateUI(res, "SPECIAL");
            addH(res);
        });
    }

    function spinChar() {
        startSpin(() => {
            const c = document.getElementById('charSelect').value;
            const res = charData[c][Math.floor(Math.random() * charData[c].length)];
            updateUI(res, `CHAR: ${c.toUpperCase()}`);
            addH(res);
        });
    }

    function updateUI(m, b) { document.getElementById('epDisplay').innerHTML = m; document.getElementById('badge').innerHTML = b; }
    function addH(t) { if(!isDuplicate(t)) { history.unshift({ id: Date.now(), text: t, checked: false }); save(); } }
    function toggleC(id) { const i = history.find(h => h.id === id); if(i) i.checked = !i.checked; save(); }
    function delI(id, e) { e.stopPropagation(); history = history.filter(h => h.id !== id); save(); }
    function clearAllHistory() { if(confirm("ล้างประวัติ?")) { history = []; save(); } }
    function save() {
        localStorage.setItem('conan_fixed_v3_6', JSON.stringify(history));
        const l = document.getElementById('historyList');
        if(!history.length) { l.innerHTML = '<div style="text-align:center; padding:10px; color:#555;">ไม่มีประวัติ</div>'; return; }
        l.innerHTML = history.map(h => `<div class="history-item ${h.checked ? 'checked' : ''}" onclick="toggleC(${h.id})"><span>${h.text}</span><div><span class="btn-del" onclick="delI(${h.id}, event)">🗑️</span></div></div>`).join('');
    }
    save();
</script>
</body>
</html>
