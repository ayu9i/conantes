<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Temperature | Premium Sensor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* พื้นหลังหรูๆ */
        .bg-gradient {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        /* การ์ดแก้ว */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 300px;
            position: relative;
        }

        /* วงแหวนสถานะ */
        .temp-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--glass);
            position: relative;
            transition: all 0.5s ease;
        }

        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top: 2px solid var(--gold);
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 { font-size: 1rem; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
        .temp-value { font-size: 4rem; font-weight: bold; margin: 0; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        .unit { font-size: 1.5rem; color: var(--gold); }
        .status-text { margin-top: 15px; font-size: 0.9rem; opacity: 0.7; }

    </style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="card">
    <h1>System Monitor</h1>
    <div class="temp-circle" id="circle">
        <div class="glow"></div>
        <p class="temp-value" id="temp-display">--</p>
        <span class="unit">°C</span>
    </div>
    <div class="status-text" id="status-msg">กำลังตรวจสอบความร้อน...</div>
</div>

<script>
    async function updateTemp() {
        try {
            // ดึงข้อมูลแบตเตอรี่ (สำหรับ Android/Chrome)
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                
                // หมายเหตุ: เบราว์เซอร์ส่วนใหญ่ตัดการเข้าถึงอุณหภูมิโดยตรงออก
                // เราจะใช้การจำลอง Logic จากเปอร์เซ็นต์และสถานะชาร์จเพื่อให้เห็น UI ทำงาน
                // หรือถ้าใช้ API เฉพาะทางในเครื่องบางรุ่นจะดึงค่าจริงได้
                
                let mockTemp = 32 + (Math.random() * 5); // จำลองอุณหภูมิฐาน
                if(battery.charging) mockTemp += 10; // ถ้าชาร์จอยู่จะร้อนขึ้น
                
                displayTemp(mockTemp.toFixed(1));
            } else {
                displayTemp("N/A");
                document.getElementById('status-msg').innerText = "เบราว์เซอร์ไม่รองรับ";
            }
        } catch (e) {
            console.error(e);
        }
    }

    function displayTemp(val) {
        const el = document.getElementById('temp-display');
        const circle = document.getElementById('circle');
        const msg = document.getElementById('status-msg');
        
        el.innerText = val;

        // เปลี่ยนสีตามความร้อน
        if(val > 40) {
            circle.style.borderColor = "#ff4d4d";
            msg.innerText = "ระบบมีความร้อนสูง (Critical)";
            msg.style.color = "#ff4d4d";
        } else if(val > 35) {
            circle.style.borderColor = "#ffa500";
            msg.innerText = "เครื่องเริ่มอุ่น (Warning)";
        } else {
            circle.style.borderColor = "var(--gold)";
            msg.innerText = "สถานะปกติ (Optimal)";
        }
    }

    // อัปเดตทุกๆ 3 วินาที
    setInterval(updateTemp, 3000);
    updateTemp();
</script>

</body>
</html>
