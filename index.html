<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan Hub | Closed Beta Finished</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --conan-gold: #d4af37; --glass: rgba(255, 255, 255, 0.08); --danger: #ff4d4d; }
        body { margin: 0; font-family: 'Kanit', sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; overflow-x: hidden; }
        
        .alert-banner {
            width: 100%;
            background: linear-gradient(90deg, #000, #ff4d4d, #000);
            color: #fff;
            padding: 10px 0;
            font-size: 0.8rem;
            text-align: center;
            border-bottom: 1px solid var(--danger);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .alert-banner b { color: #fff; text-shadow: 0 0 5px #ff4d4d; }

        #updateModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-content { background: #111; border: 2px solid var(--danger); border-radius: 20px; padding: 25px; max-width: 400px; width: 85%; text-align: center; }
        
        .container { width: 100%; max-width: 500px; padding: 20px 15px; text-align: center; filter: grayscale(0.8); pointer-events: none; opacity: 0.6; }
        .premium-card { background: var(--glass); border: 1px solid rgba(255, 77, 77, 0.3); border-radius: 24px; padding: 20px; backdrop-filter: blur(15px); }
        .result-container { margin: 10px 0; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ep-display { font-size: 1.8rem; font-weight: 600; color: var(--danger); }
        .btn-main { width: 100%; padding: 12px; font-size: 1rem; font-weight: 600; border-radius: 12px; border: none; cursor: not-allowed; margin-bottom: 8px; font-family: 'Kanit'; background: #333 !important; color: #777 !important; }
        
        .closed-tag { color: var(--danger); font-weight: 600; font-size: 1.2rem; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="alert-banner">
    <b>🔒 หมดเวลาช่วงทดสอบระบบ (Test Session Ended)</b>
</div>

<div id="updateModal">
    <div class="modal-content">
        <h2 style="color: var(--danger);">🛑 สิ้นสุดการทดสอบ</h2>
        <p>ขอบคุณที่มาร่วมสืบคดีในช่วง Beta!<br>ขณะนี้ระบบ<b>ปิดเพื่อปรับปรุง</b>และรอการอัปเดตครั้งถัดไป</p>
        <div style="font-size: 0.8rem; color: #888; margin-top: 15px;">
            ไม่สามารถสุ่มตอนใหม่ได้ในเวอร์ชันนี้<br>โปรดติดตามการอัปเดตอย่างเป็นทางการเร็วๆ นี้
        </div>
    </div>
</div>

<div class="container">
    <h2 style="letter-spacing: 2px;">CONAN HUB</h2>
    <div class="premium-card">
        <div class="result-container">
            <h2 class="ep-display">SESSION CLOSED</h2>
            <span class="closed-tag">งดใช้งานชั่วคราว</span>
        </div>
        <button class="btn-main">สุ่มทุกอย่าง (ปิดระบบ)</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button class="btn-main">มูฟวี่</button>
            <button class="btn-main">ตอนพิเศษ</button>
        </div>
        <button class="btn-main">สุ่มตามตัวละคร</button>
    </div>
</div>

</body>
</html>
